[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "CLAH_ImageAnalysis"
version = "1.1"
description = "Suite of Python programs used for 2-photon calcium imaging analysis"
authors = [{ name = "Alex Hurowitz" }]
requires-python = "==3.11.8"

dependencies = [
    "SimpleITK",
    "aenum",
    "easygui",
    "h5py",
    "inquirer",
    "isx",
    "libsvm",
    "lxml",
    "pandas",
    "plotly",
    "prettytable",
    "rasterio",
    "rich",
    "scikit-image",
    "scikit-learn",
    "scipy",
    "seaborn",
    "toml",
    "tomli",
    "tqdm",
    "ttkthemes",
]

[tool.setuptools.packages.find]
where = ["."]
